<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap" rel="stylesheet">
<style>
body {
	background: radial-gradient(circle, #ceb487 0%, #dda572 100%);
	margin: 0;
	height: 100vh;
	overflow: hidden;
}

.centered_text {
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	text-align: center;
	min-height: 100vh;
}

h1 {
	font-family: 'Jacquard 12', sans-serif;
}

button {
	display: block;
	margin-left: auto;
	margin-right: auto;
	margin-bottom: 20px;
}
</style>
</head>

<body>
<div class="centered_text">
<h1>Journal</h1>
<button onclick="window.location.href='../index.html'">to main</button>
<pre id="journal_entry"></pre>
<script>
const dir = "./entries/";
const file = "entry_001.txt";
fetch(dir + file)
  .then(response => response.text())
  .then(data => document.getElementById("journal_entry").textContent = data);
</script>
</div>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zeozen.garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap" rel="stylesheet">
<style>
body {
	background: radial-gradient(circle, #ceb487 0%, #dda572 100%);
	margin: 0;
	height: 100vh;
	overflow: hidden;
	cursor: url('res/cur_point.png') 0 0, auto;
}
.main_text {
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	text-align: center;
	min-height: 100vh;
	font-family: "Jacquard 12", system-ui;
	font-weight: 400;
	font-style: normal;
	color: #556409;
	font-size: 3rem;
}
.centered_rect {
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
}
button:hover, button:focus {
	cursor: url('res/cur_point.png') 0 0, auto;
}
</style>
</head>
<body>
<div class="centered_rect">
	<div>sessions: <span id="visit-counter">0</span></div>
	<main class="main_text">
		<p>welcome to the garden<br>there's not a lot here yet<br>maybe something will grow?</p>
		<button id="btn-gallery">View Gallery</button>
		<button id="btn-journal">View Journal</button>
		<button id="btn-library">View Library</button>
	</main>
</div>

<!-- UMD Supabase + your JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./code/page_count.js"></script>
</body>
</html>
